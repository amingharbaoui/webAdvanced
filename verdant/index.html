 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./public/leaf-outline.svg" />

    <link href="https://api.fontshare.com/v2/css?f[]=technor@200,300,400,500,600,700&f[]=quicksand@500&f[]=general-sans@500&f[]=pilcrow-rounded@400,500,600,700,900&display=swap" rel="stylesheet">

<navbar class="navbar_container">

  </div>
<!--  Navbar search bar -->
  <div class="search_bar">
    <input class="input" type="text" placeholder="What do you need ?"

    >

      <button class="input_btn">
        search
        <ion-icon name="search-outline" class="search_icon"></ion-icon>
      </button>
    </div>

  </div>

  <div class="navbar_buttons">

    <!--  Favorite button -->
    <button class="favorite_btn">
      <i class="fa-solid fa-heart heart"></i>
    </button>

    <!--  Theme switcher button-->
    <button class="theme_btn">
      <i class="fa-solid fa-moon moon"></i>
      <ion-icon class="sunny" name="sunny-outline"></ion-icon>
    </button>

  </div>
</navbar>

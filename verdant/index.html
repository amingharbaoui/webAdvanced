 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./public/icons8-leaf-48.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://api.fontshare.com/v2/css?f[]=technor@200,300,400,500,600,700&f[]=quicksand@500&f[]=general-sans@500&f[]=pilcrow-rounded@400,500,600,700,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
    <title>Verdant - Every leaf has a story</title>
  </head>
  <body>

<!--  Navbar -->
<navbar class="navbar_container">
<!--  Navbar icon and title-->
  <div class="navbar_container_info">
    <ion-icon name="leaf-outline" class="navbar_container_info_leaf"></ion-icon>
    <!--  Navbar titel -->
    <h2 class="navbar_container_info_title">Verdant</h2>
  </div>
<!--  Navbar search bar -->
  <div class="navbar_container_searchbar">
    <input class="navbar_container_searchbar_input" type="text"
           placeholder="What do you need ?"

    >
    <div class="navbar_container_searchbar_buttoncontainer">
      <button class="navbar_container_searchbar_buttoncontainer_button">
        search
        <ion-icon name="search-outline"
                  class="navbar_container_searchbar_buttoncontainer_button_icon"></ion-icon>
      </button>
    </div>

  </div>

  <div class="navbar_container_buttons">
    <button class="navbar_container_buttons_favorite">
      <ion-icon class="navbar_container_buttons_favorite_sparkles"
                name="sparkles-outline"></ion-icon>
    </button>

    <button class="navbar_container_buttons_theme">
      <ion-icon name="moon-outline"
                class="navbar_container_buttons_theme_moon"></ion-icon>
      <ion-icon class="navbar_container_buttons_theme_sunny"
                name="sunny-outline"></ion-icon>
    </button>

  </div>
</navbar>

<!--Categories and filter-->

<section class="categories_container">
  <p class="categories_container_title">categories</p>
  <ul class="categories_container_items">
    <li class="categories_container_items_item active" data-filter="all" >
      all
    </li>
    <li class="categories_container_items_item" data-filter="indoor">
      indoor
    </li>
    <li class="categories_container_items_item" data-filter="outdoor">
      outdoor
    </li>
    <li class="categories_container_items_item" data-filter="edible">
      edible
    </li>
    <li class="categories_container_items_item" data-filter="poisonous">
      poisonous
    </li>

    <li class="categories_container_items_item_filter">
      more filters
      <div class="categories_container_items_item_filter_panel">

      </div>
    </li>
  </ul>
</section>

<!--Quote-->
<section class="quote_container">
  <q class="quote_container_text">
    Plants are proof that life can grow from quiet patience and simple light...
  </q>
</section>

<!--cards -->
<div class="card_container">
  <div class="card_container_items" id="card_container_items_gallery">

    <template id="plant_card_template">
      <div class="card_container_item">
        <div class="card_container_item_content_intern">
          <div class="card_container_item_content_intern_top">
          <span class="card_container_item_content_intern_top_icon">
            <ion-icon class="card_container_item_content_intern_top_icon_sparkles"
                      name="sparkles-outline"></ion-icon>
          </span>
          </div>
          <div class="card_container_item_content_intern_image"></div>
        </div>
        <div class="card_container_items_item_content_extern">
          <div class="card_container_items_item_content_extern_information">
            <p class="card_container_items_item_content_extern_information_title"></p>
            <span class="card_container_items_item_content_extern_information_subtitle"></span>
          </div>
        </div>

      </div>
    </template>
  </div>
</div>

<div class="load">
  <button class="load_button">Keep exploring <i class="fa-regular fa-compass"></i></button>
</div>

<!--Font Awesome Icons / Ion Icons -->
<script src="https://kit.fontawesome.com/c1b627158e.js" crossorigin="anonymous"></script>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<!--Js script tag-->
<script type="module" src="./src/main.js"></script>
  </body>
</html>
